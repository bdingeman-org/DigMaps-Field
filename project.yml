# XcodeGen spec — CI runs `xcodegen generate` to produce DigMapsField.xcodeproj.
# (No checked-in pbxproj: one less fragile machine-generated file to maintain.)
name: DigMapsField
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig
targets:
  DigMapsField:
    type: application
    platform: iOS
    sources:
      - DigMapsField
    settings:
      base:
        INFOPLIST_FILE: DigMapsField/Info.plist
        CODE_SIGN_ENTITLEMENTS: DigMapsField/DigMapsField.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_IDENTIFIER)
        PRODUCT_NAME: $(APP_DISPLAY_NAME)
        DEVELOPMENT_TEAM: $(DEVELOPER_TEAM_ID)
        MARKETING_VERSION: $(MARKETING_VERSION)
        CURRENT_PROJECT_VERSION: $(CURRENT_PROJECT_VERSION)
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"  # language MODE (4.0/4.2/5.0/6.0), not compiler version
        ENABLE_USER_SCRIPT_SANDBOXING: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # signing is managed by fastlane match in CI
        CODE_SIGN_STYLE: Manual
schemes:
  DigMapsField:
    build:
      targets:
        DigMapsField: all
    archive:
      config: Release
