name: 1. Validate Secrets
on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets are present
        env:
          TEAMID: ${{ secrets.TEAMID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          missing=0
          for s in TEAMID FASTLANE_ISSUER_ID FASTLANE_KEY_ID FASTLANE_KEY GH_PAT MATCH_PASSWORD; do
            if [ -z "${!s}" ]; then echo "::error::Secret $s is not set"; missing=1; fi
          done
          exit $missing

      - name: Create Match-Secrets repo if missing
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          OWNER: ${{ github.repository_owner }}
        run: |
          if gh repo view "$OWNER/Match-Secrets" >/dev/null 2>&1; then
            echo "Match-Secrets exists."
          else
            gh repo create "$OWNER/Match-Secrets" --private
            echo "Created private $OWNER/Match-Secrets."
          fi

      - name: Validate App Store Connect key
        env:
          TEAMID: ${{ secrets.TEAMID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          bundle install
          bundle exec fastlane validate_secrets
