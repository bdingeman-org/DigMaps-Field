name: 3. Build DigMaps Field
on:
  workflow_dispatch:
  schedule:
    # monthly keep-alive so the TestFlight build never hits the 90-day expiry
    - cron: "0 8 1 * *"

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        # ASC rejects uploads not built with the iOS 26 SDK (ITMS-90725),
        # and it only tells you at upload time — pin instead of gambling
        # on the runner image default.
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "::error::No Xcode 26 on this runner image — check the macos-15 image manifest"
            ls -d /Applications/Xcode*.app
            exit 1
          fi
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and upload to TestFlight
        env:
          TEAMID: ${{ secrets.TEAMID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          bundle install
          bundle exec fastlane build_digmaps_field

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/Library/Logs/gym
            /tmp/fastlane*
          if-no-files-found: ignore
